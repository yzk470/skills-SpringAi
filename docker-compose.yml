version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: skills-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:root}
      MYSQL_DATABASE: skills_agent
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/sql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: skills-springai-agent
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - SERVER_PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=skills_agent
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:root}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能金融顾问</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22252f;
    --border: #2a2d38;
    --text: #e1e4ea;
    --text2: #8b8fa5;
    --accent: #4f8ff7;
    --accent-glow: rgba(79,143,247,.25);
    --gold: #f0b90b;
    --red: #f6465d;
    --green: #0ecb81;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #7c5cfc);
    border-radius: 10px;
    display: flex; align-items:center; justify-content:center;
    font-size: 18px;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .subtitle { font-size: 12px; color: var(--text2); }

  .agent-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .agent-select:focus { border-color: var(--accent); }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 860px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items:center; justify-content:center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .message.user .avatar { background: var(--accent); }
  .message.assistant .avatar {
    background: linear-gradient(135deg, var(--gold), #f8d33a);
    color: #1a1a1a;
  }

  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    line-height: 1.7;
    font-size: 14px;
    word-break: break-word;
  }
  .message.user .bubble {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* marked + KaTeX rendered content — dark theme overrides */
  .bubble h2, .bubble h3 { margin: 16px 0 8px; }
  .bubble h2 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .bubble h3 { font-size: 15px; }
  .bubble table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .bubble th { background: var(--surface2); font-weight: 600; }
  .bubble code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .bubble pre code {
    background: none;
    padding: 0;
  }
  .bubble strong { color: var(--gold); }
  .bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text2);
  }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 2px 0; }

  /* KaTeX dark theme overrides */
  .bubble .katex-display { margin: 12px 0; overflow-x: auto; overflow-y: hidden; }
  .bubble .katex { color: var(--text); }
  .bubble .katex .mord { color: var(--text); }

  .typing-cursor::after {
    content: '▊';
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Input area */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text2); }

  .btn-send {
    width: 44px; height: 44px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .2s;
    display: flex; align-items:center; justify-content:center;
  }
  .btn-send:hover { background: #3d7be6; box-shadow: 0 0 16px var(--accent-glow); }
  .btn-send:disabled { background: var(--border); cursor: not-allowed; box-shadow: none; }
  .btn-send svg { width: 20px; height: 20px; }

  .stream-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .stream-toggle input { display: none; }
  .stream-toggle .track {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background .2s;
  }
  .stream-toggle .track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
  }
  .stream-toggle input:checked + .track {
    background: var(--accent);
  }
  .stream-toggle input:checked + .track::after {
    transform: translateX(14px);
  }

  .session-bar {
    font-size: 11px;
    color: var(--text2);
    text-align: center;
    padding: 4px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .empty-state {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; opacity: .4; }
  .empty-state p { font-size: 14px; }
  .quick-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all .2s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">📊</div>
    <div>
      <h1>智能金融顾问</h1>
      <div class="subtitle">Powered by Spring AI + DeepSeek</div>
    </div>
  </div>
  <select class="agent-select" id="agentSelect">
    <option value="全能金融顾问大师" selected>全能金融顾问大师</option>
  </select>
</div>

<div class="chat-container" id="chatContainer">
  <div class="empty-state" id="emptyState">
    <div class="icon">🤖</div>
    <p>我是你的智能金融顾问，可以帮你做技术分析、风险评估、投资组合优化</p>
    <div class="quick-actions">
      <button class="quick-btn" data-msg="对贵州茅台做技术分析，最近20日收盘价1620,1635,1598,1610,1645,1658,1632,1615,1670,1685,1660,1645,1655,1680,1695,1678,1665,1700,1710,1690">📈 技术分析示例</button>
      <button class="quick-btn" data-msg="请评估我的投资组合风险：50%茅台，30%五粮液，20%宁德时代">⚠️ 风险评估示例</button>
      <button class="quick-btn" data-msg="请优化我的投资组合：茅台、五粮液、宁德时代，我是进取型投资者">🎯 组合优化示例</button>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="messageInput" placeholder="输入你的问题..." rows="1" autofocus></textarea>
  <label class="stream-toggle" title="切换流式/非流式输出">
    <input type="checkbox" id="streamToggle" checked>
    <span class="track"></span>
    <span>流式</span>
  </label>
  <button class="btn-send" id="btnSend" title="发送">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>
</div>
<div class="session-bar">会话: <span id="sessionId">—</span></div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.10/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script>
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const btnSend = document.getElementById('btnSend');
const agentSelect = document.getElementById('agentSelect');
const emptyState = document.getElementById('emptyState');
const sessionSpan = document.getElementById('sessionId');
const streamToggle = document.getElementById('streamToggle');
const streamLabel = streamToggle.parentElement.querySelector('span:last-child');

streamToggle.addEventListener('change', function() {
  streamLabel.textContent = streamToggle.checked ? '流式' : '非流式';
});

const sessionId = 'session-' + Date.now();
sessionSpan.textContent = sessionId;

let isStreaming = false;
let currentAssistantBubble = null;
let currentChunks = '';
let streamRafPending = false;

function scheduleDomUpdate() {
  if (streamRafPending) return;
  streamRafPending = true;
  requestAnimationFrame(function() {
    streamRafPending = false;
    if (!currentAssistantBubble) return;
    currentAssistantBubble.textContent = currentChunks;
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}

// ---------- marked + KaTeX setup ----------
marked.setOptions({ breaks: true, gfm: true });

function renderMarkdown(text) {
  const mathBlocks = [];
  const PID = ''; // Unicode PUA char, safe from browser stripping

  // Display math: $$...$$ and \[...\]
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, f) => pushMath(f, true));
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_, f) => pushMath(f, true));

  // Inline math: $...$ and \(...\)
  text = text.replace(/\$([^$\n]+)\$/g, (_, f) => pushMath(f, false));
  text = text.replace(/\\\(([^)]+)\\\)/g, (_, f) => pushMath(f, false));

  // marked.parse returns a string
  let html = marked.parse(text);

  // Restore KaTeX-rendered math
  for (let i = 0; i < mathBlocks.length; i++) {
    html = html.replace(PID + i + PID, mathBlocks[i]);
  }

  return html;

  function pushMath(formula, display) {
    const i = mathBlocks.length;
    try {
      mathBlocks.push(katex.renderToString(formula.trim(), {
        displayMode: display,
        throwOnError: false,
        strict: false
      }));
    } catch (e) {
      mathBlocks.push(display
        ? '<pre class="math-fallback">' + escHtml(formula.trim()) + '</pre>'
        : '<code class="math-fallback">' + escHtml(formula.trim()) + '</code>');
    }
    return PID + i + PID;
  }
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---------- Chat logic ----------
function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addMessage(role, content) {
  if (emptyState) emptyState.remove();
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = '<div class="avatar">' + (role === 'user' ? '👤' : '🤖') + '</div><div class="bubble">' + content + '</div>';
  chatContainer.appendChild(div);
  scrollToBottom();
  return div;
}

function startAssistantMessage() {
  if (emptyState) emptyState.remove();
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing-cursor"></div>';
  chatContainer.appendChild(div);
  currentAssistantBubble = div.querySelector('.bubble');
  currentChunks = '';
  return div;
}

function appendChunk(chunk) {
  currentChunks += chunk;
  currentAssistantBubble.classList.add('typing-cursor');
  scheduleDomUpdate();
}

function finishAssistantMessage() {
  currentAssistantBubble.classList.remove('typing-cursor');
  currentAssistantBubble.innerHTML = renderMarkdown(currentChunks);
  currentAssistantBubble = null;
  currentChunks = '';
  scrollToBottom();
}

async function sendMessage() {
  const message = messageInput.value.trim();
  if (!message || isStreaming) return;

  isStreaming = true;
  btnSend.disabled = true;
  messageInput.value = '';
  messageInput.style.height = 'auto';

  addMessage('user', message);
  startAssistantMessage();

  const agentName = encodeURIComponent(agentSelect.value);
  const msg = encodeURIComponent(message);
  const useStream = streamToggle.checked;

  if (useStream) {
    await sendStreaming(agentName, msg);
  } else {
    await sendNonStreaming(agentName, msg);
  }

  isStreaming = false;
  btnSend.disabled = false;
  messageInput.focus();
}

async function sendStreaming(agentName, msg) {
  const url = '/api/chat/stream?agentName=' + agentName + '&message=' + msg + '&sessionId=' + sessionId;
  try {
    const response = await fetch(url);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event:')) {
          eventType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          const data = line.slice(5).trim();
          if (eventType === 'content') {
            try {
              const json = JSON.parse(data);
              if (json.chunk) appendChunk(json.chunk);
            } catch (e) {}
          }
        }
      }
    }
    finishAssistantMessage();
  } catch (err) {
    currentAssistantBubble.textContent = '请求失败: ' + err.message;
    currentAssistantBubble.classList.remove('typing-cursor');
    currentAssistantBubble = null;
  }
}

async function sendNonStreaming(agentName, msg) {
  const url = '/api/chat?agentName=' + agentName + '&message=' + msg + '&sessionId=' + sessionId;
  try {
    const response = await fetch(url);
    const data = await response.json();
    if (data.error) {
      currentAssistantBubble.textContent = data.error;
    } else {
      currentAssistantBubble.innerHTML = renderMarkdown(data.content);
    }
    currentAssistantBubble.classList.remove('typing-cursor');
    currentAssistantBubble = null;
    currentChunks = '';
    scrollToBottom();
  } catch (err) {
    currentAssistantBubble.textContent = '请求失败: ' + err.message;
    currentAssistantBubble.classList.remove('typing-cursor');
    currentAssistantBubble = null;
  }
}

btnSend.addEventListener('click', sendMessage);

messageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messageInput.addEventListener('input', function() {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
});

document.querySelectorAll('.quick-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    messageInput.value = btn.dataset.msg;
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    sendMessage();
  });
});
</script>
</body>
</html>
